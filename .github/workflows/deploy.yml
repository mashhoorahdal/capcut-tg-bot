name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: koyeb/action-koyeb@v1
        with:
          api_token: ${{ secrets.KOYEB_TOKEN }}
          app: capcut-tg-bot
          service: capcut-tg-bot
